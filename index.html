<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Image Recognition</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; }
    img { max-width: 100%; border-radius: 8px; margin: 16px 0; }
    pre { background: #f4f4f4; padding: 16px; border-radius: 8px; overflow-x: auto; }
    button { padding: 10px 24px; background: #6B4FBB; color: white; border: none; border-radius: 6px; cursor: pointer; }
  </style>
</head>
<body>
  <h2>Image Recognition App</h2>
  <input type="file" id="fileInput" accept="image/*">
  <br><br>
  <button onclick="analyzeImage()">Analyze Image</button>
  <div id="preview"></div>
  <pre id="results">Results will appear here...</pre>

  <script>
    const API_URL = 'https://nkmpfwzg52.execute-api.us-east-1.amazonaws.com/prod/analyze';

    async function analyzeImage() {
      const file = document.getElementById('fileInput').files[0];
      if (!file) return alert('Please select an image');

      // Preview
      const reader = new FileReader();
      reader.onload = e => {
        document.getElementById('preview').innerHTML = `<img src="${e.target.result}">`;
      };
      reader.readAsDataURL(file);

      // Convert to base64 and send
      const base64Reader = new FileReader();
      base64Reader.onload = async e => {
        const base64 = e.target.result.split(',')[1];
        document.getElementById('results').textContent = 'Analyzing...';

        const res = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ image: base64, filename: file.name })
        });

        const data = await res.json();
        document.getElementById('results').textContent = JSON.stringify(data, null, 2);
      };
      base64Reader.readAsDataURL(file);
    }
  </script>
</body>
</html>
